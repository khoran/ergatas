<div data-bind="visible: loading" class="text-center my-5">
    <img width="150" src="/img/block-spinner2.svg"/>
</div>

<div data-bind="visible: !loading() && error()">
    <div class="alert alert-danger" data-bind="text: error"></div>
</div>

<div data-bind="visible: !loading() && !error()">
    <h3>Documents</h3>

    <!-- ko ifnot: enabled() -->
    <p class="text-muted">Document submission is not enabled for your organization.</p>
    <!-- /ko -->

    <!-- ko if: enabled() -->

    <h5 class="mt-4" data-bind="text: 'Current Period: ' + (currentPeriod() ? currentPeriod().label : '')"></h5>
    <table class="table table-sm table-bordered mt-2">
        <thead>
            <tr>
                <th>Document Type</th>
                <th>Status</th>
                <th>Submitted</th>
                <th>File</th>
                <th></th>
            </tr>
        </thead>
        <tbody data-bind="foreach: currentPeriodSlots()">
            <tr>
                <td data-bind="text: label"></td>
                <td>
                    <!-- ko if: submitted -->
                    <span class="badge badge-success">Submitted</span>
                    <!-- /ko -->
                    <!-- ko ifnot: submitted -->
                    <span class="badge badge-warning">Pending</span>
                    <!-- /ko -->
                </td>
                <td>
                    <!-- ko if: submitted -->
                    <span data-bind="text: $component.formatDate(submitted.created_on)"></span>
                    <!-- /ko -->
                </td>
                <td>
                    <!-- ko if: submitted -->
                    <span data-bind="text: submitted.original_filename"></span>
                    <!-- /ko -->
                </td>
                <td class="text-right">
                    <!-- ko ifnot: submitted -->
                    <button class="btn btn-sm btn-primary" data-bind="click: () => $component.uploadDocument($data)">
                        <i class="fas fa-upload"></i> Upload
                    </button>
                    <!-- /ko -->
                    <!-- ko if: submitted -->
                    <button class="btn btn-sm btn-outline-danger" data-bind="click: () => $component.deleteDocument(submitted)">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <!-- /ko -->
                </td>
            </tr>
        </tbody>
    </table>

    <!-- ko if: historicalDocs().length > 0 -->
    <h5 class="mt-4">Previous Submissions</h5>
    <table class="table table-sm mt-2">
        <thead>
            <tr>
                <th>Period</th>
                <th>Type</th>
                <th>File</th>
                <th>Submitted</th>
                <th></th>
            </tr>
        </thead>
        <tbody data-bind="foreach: historicalDocs()">
            <tr>
                <td data-bind="text: $component.formatDate(submission_period)"></td>
                <td data-bind="text: $component.docTypeLabel(document_type)"></td>
                <td data-bind="text: original_filename"></td>
                <td data-bind="text: $component.formatDate(created_on)"></td>
                <td class="text-right">
                    <button class="btn btn-sm btn-outline-danger" data-bind="click: $component.deleteDocument">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    <!-- /ko -->

    <!-- /ko -->
</div>
