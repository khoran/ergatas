<div>
    <table class="table table-sm align-middle" data-bind="visible: rows().length > 0">
        <thead>
            <tr class="text-muted small">
                <th style="width:56px;"></th>
                <th>Document</th>
                <th>Type</th>
                <th>Period</th>
                <th class="text-right">Actions</th>
            </tr>
        </thead>
        <tbody data-bind="foreach: rows">
            <tr>
                <td>
                    <img alt="document preview"
                         style="width:44px; height:44px; object-fit:cover; border-radius:4px;"
                         data-bind="visible: !thumbFailed() && thumbUrl,
                                    attr:{ src: thumbUrl },
                                    event:{ error: function(){ thumbFailed(true); } }" />
                    <span class="text-muted" data-bind="visible: thumbFailed() || !thumbUrl">
                        <i class="far fa-file fa-2x"></i>
                    </span>
                </td>
                <td data-bind="text: name"></td>
                <td data-bind="text: typeLabel"></td>
                <td data-bind="text: periodLabel"></td>
                <td class="text-right text-nowrap">
                    <a class="mx-2"
                       data-bind="visible: downloadUrl,
                                  attr:{ href: downloadUrl, target: '_blank', rel: 'noopener noreferrer' }"
                       aria-label="download document" title="Download">
                        <i class="fas fa-download"></i>
                    </a>
                    <a href="#" class="mx-2 text-danger"
                       data-bind="visible: !$component.readOnly,
                                  click: $component.deleteRow"
                       aria-label="delete document" title="Delete">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="text-muted small" data-bind="visible: rows().length === 0">No documents.</div>
</div>
